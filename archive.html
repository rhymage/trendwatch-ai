<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrendWatch AI — 모델 아카이브</title>
<meta name="description" content="GitHub·Hugging Face 오픈모델·도구 아카이브">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<style>
  :root {
    --bg: #f6f7f9; --card: #ffffff; --ink: #1a1d21; --sub: #5c6470;
    --line: #e3e6ea; --accent: #4f46e5; --accent-soft: #eef2ff;
    --old-bg: #f3f4f6; --nav-w: 220px;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
         font-family: "Pretendard", "Malgun Gothic", "Apple SD Gothic Neo", sans-serif;
         line-height: 1.65; font-size: 15px; }
  a { color: var(--accent); }
  nav#sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: var(--nav-w);
                background: #1c2128; color: #e6e8eb; padding: 24px 0; overflow-y: auto; }
  .nav-title { font-size: 17px; font-weight: 800; padding: 0 20px 14px;
               letter-spacing: -0.3px; border-bottom: 1px solid #333a44;
               display: flex; align-items: center; gap: 9px; }
  .nav-title img { width: 26px; height: 26px; border-radius: 6px; }
  .nav-title small { display: block; font-weight: 400; color: #8b949e; font-size: 11.5px; }
  .nav-pages { margin: 12px 0 4px; padding: 0 12px; display: flex; gap: 6px; }
  .nav-pages a { flex: 1; text-align: center; padding: 7px 0; border-radius: 8px;
                 color: #adb5bd; text-decoration: none; font-size: 13px; font-weight: 700; }
  .nav-pages a.on { background: var(--accent); color: #fff; }
  .nav-pages a:not(.on):hover { background: #262d36; color: #fff; }
  .nav-sec { padding: 14px 20px 6px; font-size: 11px; font-weight: 700; color: #6e7781;
             text-transform: uppercase; letter-spacing: .6px; }
  #cat-nav { list-style: none; margin: 0; padding: 0; }
  #cat-nav a { display: block; padding: 8px 20px; color: #adb5bd; text-decoration: none;
               font-size: 13.5px; font-weight: 600; border-left: 3px solid transparent; cursor: pointer; }
  #cat-nav a:hover { background: #262d36; color: #fff; }
  #cat-nav a.active { background: #262d36; color: #fff; border-left-color: var(--accent); }
  #cat-nav .cnt { float: right; font-size: 11.5px; color: #6e7781; }
  .nav-updated { padding: 16px 20px; font-size: 11.5px; color: #6e7781; }
  main { margin-left: var(--nav-w); padding: 32px 24px 64px; }
  .wrap { max-width: 900px; margin: 0 auto; }
  header.page h1 { font-size: 26px; margin: 0 0 4px; letter-spacing: -0.5px; }
  header.page p { color: var(--sub); font-size: 14px; margin: 0 0 20px; }
  /* Active/Old 서브메뉴 */
  #subtabs { display: flex; gap: 8px; margin-bottom: 24px; }
  .stab { border: 1px solid var(--line); background: var(--card); color: var(--sub);
          border-radius: 8px; padding: 6px 18px; font-size: 13.5px; font-weight: 700;
          cursor: pointer; font-family: inherit; }
  .stab.on { background: var(--ink); border-color: var(--ink); color: #fff; }
  .stab .cnt { opacity: .6; font-weight: 400; margin-left: 4px; font-size: 12px; }
  /* 카드 그리드 */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(270px, 1fr)); gap: 14px; }
  .mcard { background: var(--card); border: 1px solid var(--line); border-radius: 12px;
           padding: 14px 16px; box-shadow: 0 1px 3px rgba(0,0,0,.04); }
  .mcard.old { background: var(--old-bg); opacity: .82; }
  .mcard .top { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-bottom: 5px; }
  .cat-b { font-size: 11.5px; font-weight: 700; color: var(--accent); background: var(--accent-soft);
           border: 1px solid #c7d2fe; padding: 1px 8px; border-radius: 6px; }
  .type-b { font-size: 11.5px; color: var(--sub); background: var(--bg);
            border: 1px solid var(--line); padding: 1px 8px; border-radius: 6px; }
  .old-b { font-size: 11.5px; font-weight: 700; color: #92400e; background: #fef3c7;
           border: 1px solid #fde68a; padding: 1px 8px; border-radius: 6px; }
  .mcard h3 { margin: 2px 0 2px; font-size: 15.5px; letter-spacing: -0.2px; line-height: 1.4;
              word-break: break-all; }
  .mcard h3 a { color: var(--ink); text-decoration: none; }
  .mcard h3 a:hover { color: var(--accent); text-decoration: underline; }
  .mcard .org { font-size: 12.5px; color: var(--sub); margin-bottom: 6px; }
  .mcard p.desc { margin: 0 0 8px; font-size: 13px; color: #3a4048; }
  .mcard .foot { font-size: 12px; color: var(--sub); }
  .mcard .sup { font-size: 12px; color: #92400e; margin-top: 4px; }
  #empty { color: var(--sub); text-align: center; padding: 80px 0; grid-column: 1 / -1; }
  footer { margin-left: var(--nav-w); padding: 24px; text-align: center;
           color: var(--sub); font-size: 12.5px; }
  @media (max-width: 760px) {
    nav#sidebar { position: static; width: auto; padding: 14px 0 6px; }
    #cat-nav { display: flex; overflow-x: auto; }
    #cat-nav a { border-left: none; white-space: nowrap; }
    #cat-nav .cnt { float: none; margin-left: 5px; }
    .nav-updated { display: none; }
    main, footer { margin-left: 0; }
  }
</style>
</head>
<body>

<nav id="sidebar">
  <div class="nav-title"><img src="favicon.svg" alt="">
    <span>TrendWatch AI<small>모델 아카이브</small></span></div>
  <div class="nav-pages">
    <a href="index.html">뉴스</a>
    <a href="archive.html" class="on">아카이브</a>
  </div>
  <div class="nav-sec">카테고리</div>
  <ul id="cat-nav"></ul>
  <div class="nav-updated" id="updated"></div>
</nav>

<main>
  <div class="wrap">
    <header class="page">
      <h1>모델 아카이브</h1>
      <p>GitHub · Hugging Face에서 수집한 오픈모델·도구. 새 버전이 나오면 기존 항목은 Old로 이동합니다.</p>
    </header>
    <div id="subtabs"></div>
    <div class="grid" id="grid"><div id="empty">데이터를 불러오는 중…</div></div>
  </div>
</main>

<footer>TrendWatch AI — 매일 자동 수집 · 상세 정보는 원본 링크 확인</footer>

<script>
const BASE_CATS = ["LLM","이미지","비디오","오디오","LoRA","Workflow","ComfyUI","에이전트도구","기타"];
let items = [], cat = "", mode = "active";

// 카테고리 목록은 기본 + 데이터에 등장하는 새 카테고리를 자동 병합
function allCats() {
  const cats = [...BASE_CATS];
  items.forEach(it => { if (it.category && !cats.includes(it.category)) cats.push(it.category); });
  return cats;
}

const esc = s => String(s ?? "").replace(/[&<>"']/g, c =>
  ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

const inCat = it => cat === "" || it.category === cat;

function renderNav() {
  const counts = {};
  items.forEach(it => counts[it.category] = (counts[it.category] || 0) + 1);
  document.getElementById("cat-nav").innerHTML =
    `<li><a data-cat="" class="${cat === "" ? "active" : ""}">전체<span class="cnt">${items.length}</span></a></li>` +
    allCats().map(c => `<li><a data-cat="${esc(c)}" class="${cat === c ? "active" : ""}">${esc(c)}<span class="cnt">${counts[c] || 0}</span></a></li>`).join("");
}

function renderSubtabs() {
  const nA = items.filter(it => inCat(it) && it.status !== "old").length;
  const nO = items.filter(it => inCat(it) && it.status === "old").length;
  document.getElementById("subtabs").innerHTML =
    `<button class="stab ${mode === "active" ? "on" : ""}" data-mode="active">Active<span class="cnt">${nA}</span></button>` +
    `<button class="stab ${mode === "old" ? "on" : ""}" data-mode="old">Old<span class="cnt">${nO}</span></button>`;
}

function renderGrid() {
  const shown = items.filter(it => inCat(it) && (mode === "old" ? it.status === "old" : it.status !== "old"))
    .sort((a, b) => (b.added || "").localeCompare(a.added || ""));
  const grid = document.getElementById("grid");
  if (shown.length === 0) { grid.innerHTML = `<div id="empty">해당 항목이 없습니다.</div>`; return; }
  const byId = Object.fromEntries(items.map(it => [it.id, it]));
  grid.innerHTML = shown.map(it => `
    <article class="mcard ${it.status === "old" ? "old" : ""}" id="${esc(it.id)}">
      <div class="top">
        <span class="cat-b">${esc(it.category)}</span>
        <span class="type-b">${it.type === "huggingface" ? "🤗 HF" : it.type === "github" ? "GitHub" : esc(it.type || "")}</span>
        ${it.status === "old" ? `<span class="old-b">OLD</span>` : ""}
      </div>
      <h3><a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.name)}</a></h3>
      <div class="org">${esc(it.org || "")}</div>
      <p class="desc">${esc(it.desc || "")}</p>
      <div class="foot">${esc(it.stats || "")}${it.stats ? " · " : ""}수집 ${esc(it.added || "")}</div>
      ${it.supersededBy && byId[it.supersededBy]
        ? `<div class="sup">→ 대체: <a href="#${esc(it.supersededBy)}" onclick="jump('${esc(it.supersededBy)}')">${esc(byId[it.supersededBy].name)}</a></div>` : ""}
    </article>`).join("");
}

function jump(id) {
  const t = items.find(it => it.id === id);
  if (!t) return;
  mode = t.status === "old" ? "old" : "active";
  if (cat !== "" && t.category !== cat) cat = t.category;
  renderNav(); renderSubtabs(); renderGrid();
  setTimeout(() => document.getElementById(id)?.scrollIntoView({ behavior: "smooth", block: "center" }), 50);
}

document.addEventListener("click", e => {
  const c = e.target.closest("[data-cat]");
  if (c) { cat = c.dataset.cat; renderNav(); renderSubtabs(); renderGrid(); return; }
  const m = e.target.closest("[data-mode]");
  if (m) { mode = m.dataset.mode; renderSubtabs(); renderGrid(); }
});

fetch("data/archive.json").then(r => r.json()).then(d => {
  items = d.items || [];
  document.getElementById("updated").textContent = d.updated ? `마지막 수집: ${d.updated}` : "";
  renderNav(); renderSubtabs(); renderGrid();
}).catch(() => {
  document.getElementById("empty").textContent = "아직 수집된 데이터가 없습니다.";
});
</script>
</body>
</html>
